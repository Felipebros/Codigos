name: Test Label WIP checker CI

on:
  pull_request:
    types: [opened]
  workflow_dispatch:
  push:
    branches:
      - develop

jobs:
  test-label-wip-checker-CI:
    runs-on: ubuntu-latest

    steps:
    - name: Test WIP blocker with labels in PR
      uses: Felipebros/github-action-WIP-blocker-with-labels-in-PR@v1.5.9-alpha
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIP_LABELS: "DO NOT MERGE|NEED_REINDEX"
          APPROVALS: "2"
